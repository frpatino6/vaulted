name: Deploy Web to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Generate code
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        working-directory: apps/mobile
        run: |
          flutter build web \
            --dart-define=API_BASE_URL=https://vaulted.casacam.net/api/ \
            --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@092436dca3ec6dacb231d965ae56f7ff6c09f258  # v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VAULTED_PROD_2026 }}
          channelId: live
          projectId: vaulted-prod-2026
          entryPoint: apps/mobile
