<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep navy to dark blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1426;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1F3C;stop-opacity:1" />
    </linearGradient>
    <!-- Gold gradient for vault elements -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D78A;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
    <!-- Inner gold highlight -->
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF0A0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8C050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A07820;stop-opacity:1" />
    </linearGradient>
    <!-- Radial glow -->
    <radialGradient id="glowGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#1E3A6A;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#050D1A;stop-opacity:0" />
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#C9A84C" flood-opacity="0.3"/>
    </filter>
    <filter id="innerShadow">
      <feComposite in2="SourceGraphic" operator="arithmetic" k2="-1" k3="1"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>
  <!-- Subtle glow in center -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#glowGrad)"/>

  <!-- Outer vault ring -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="url(#goldGrad)" stroke-width="6"/>
  <!-- Outer ring decorative notches (12 positions like a clock) -->
  <g stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round">
    <!-- 12 notches around outer ring -->
    <line x1="256" y1="75" x2="256" y2="95"/>
    <line x1="256" y1="415" x2="256" y2="435"/>
    <line x1="75" y1="256" x2="95" y2="256"/>
    <line x1="415" y1="256" x2="435" y2="256"/>
    <!-- Diagonal notches -->
    <line x1="381.5" y1="128.5" x2="367.4" y2="142.6"/>
    <line x1="130.5" y1="381.5" x2="144.6" y2="367.4"/>
    <line x1="128.5" y1="130.5" x2="142.6" y2="144.6"/>
    <line x1="381.5" y1="383.5" x2="367.4" y2="369.4"/>
    <!-- Secondary notches -->
    <line x1="326" y1="80" x2="318" y2="98"/>
    <line x1="186" y1="414" x2="194" y2="432"/>
    <line x1="80" y1="326" x2="98" y2="318"/>
    <line x1="414" y1="186" x2="432" y2="194"/>
  </g>

  <!-- Main vault door circle -->
  <circle cx="256" cy="256" r="160" fill="#0E1E35" stroke="url(#goldGrad)" stroke-width="4" filter="url(#shadow)"/>

  <!-- Vault door surface texture rings -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#1A2D45" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="135" fill="none" stroke="#162540" stroke-width="1"/>

  <!-- 4 bolt handles (at cardinal positions) -->
  <!-- Top bolt -->
  <rect x="242" y="103" width="28" height="48" rx="14" fill="url(#goldGrad)"/>
  <rect x="248" y="109" width="16" height="10" rx="5" fill="#F5D78A" opacity="0.5"/>
  <!-- Bottom bolt -->
  <rect x="242" y="361" width="28" height="48" rx="14" fill="url(#goldGrad)"/>
  <rect x="248" y="367" width="16" height="10" rx="5" fill="#F5D78A" opacity="0.5"/>
  <!-- Left bolt -->
  <rect x="103" y="242" width="48" height="28" rx="14" fill="url(#goldGrad)"/>
  <rect x="109" y="248" width="10" height="16" rx="5" fill="#F5D78A" opacity="0.5"/>
  <!-- Right bolt -->
  <rect x="361" y="242" width="48" height="28" rx="14" fill="url(#goldGrad)"/>
  <rect x="367" y="248" width="10" height="16" rx="5" fill="#F5D78A" opacity="0.5"/>

  <!-- Central combination dial -->
  <circle cx="256" cy="256" r="72" fill="url(#goldGrad)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="68" fill="#0D1B2F"/>
  <circle cx="256" cy="256" r="62" fill="none" stroke="url(#goldLight)" stroke-width="2"/>

  <!-- Dial tick marks -->
  <g stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round">
    <line x1="256" y1="196" x2="256" y2="206"/>
    <line x1="256" y1="302" x2="256" y2="314"/>
    <line x1="196" y1="256" x2="206" y2="256"/>
    <line x1="302" y1="256" x2="314" y2="256"/>
    <line x1="213" y1="213" x2="220" y2="220"/>
    <line x1="292" y1="292" x2="299" y2="299"/>
    <line x1="299" y1="213" x2="292" y2="220"/>
    <line x1="213" y1="299" x2="220" y2="292"/>
  </g>

  <!-- Dial center knob -->
  <circle cx="256" cy="256" r="28" fill="url(#goldGrad)"/>
  <circle cx="256" cy="256" r="22" fill="#0D1B2F"/>
  <circle cx="256" cy="256" r="14" fill="url(#goldLight)"/>
  <circle cx="256" cy="256" r="8" fill="#1A2D45"/>

  <!-- Dial pointer/indicator -->
  <line x1="256" y1="234" x2="256" y2="244" stroke="#F5D78A" stroke-width="3" stroke-linecap="round"/>

  <!-- Keyhole at bottom of dial -->
  <circle cx="256" cy="296" r="6" fill="url(#goldGrad)"/>
  <rect x="253" y="298" width="6" height="10" rx="2" fill="url(#goldGrad)"/>
</svg>
