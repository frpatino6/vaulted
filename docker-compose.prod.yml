version: '3.9'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    image: vaulted-api:latest
    container_name: vaulted_api
    expose:
      - '3000'
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      APP_URL: ${APP_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      MEDIA_JWT_SECRET: ${MEDIA_JWT_SECRET}
      MEDIA_JWT_PREVIOUS_SECRET: ${MEDIA_JWT_PREVIOUS_SECRET:-}
      MONGODB_URI: ${MONGODB_URI}
      DATABASE_URL: ${DATABASE_URL}
      TYPEORM_SYNC: ${TYPEORM_SYNC}
      REDIS_URL: ${REDIS_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL}
      AI_EMBEDDING_DIMS: ${AI_EMBEDDING_DIMS}
      AI_CHAT_RATE_LIMIT_PER_MINUTE: ${AI_CHAT_RATE_LIMIT_PER_MINUTE}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_STORAGE_BUCKET: ${GCP_STORAGE_BUCKET:-}
    restart: always
    volumes:
      - uploads_data:/app/uploads
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - default
      - proxy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads_data:

networks:
  default:
  proxy:
    external: true
    name: frpatino6_default
